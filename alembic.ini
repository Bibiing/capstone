[alembic]
# Path to the migration scripts directory
script_location = database/migrations

# Add project root to sys.path so models can be imported
prepend_sys_path = .

# Separator for multiple version paths (if needed in future)
version_path_separator = os

# Template for migration file names: {rev}_{slug}.py
file_template = %%(rev)s_%%(slug)s

# Truncate long migration file names
truncate_slug_length = 40

# Alembic transaction per migration
transaction_per_migration = true

# =============================================================================
# Logging
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
